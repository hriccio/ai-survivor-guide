name: Release PDFs

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build PDFs
        run: python scripts/build_pdf.py --version "$GITHUB_REF_NAME"

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find dist -maxdepth 1 -type f -name '*.pdf' -exec cp {} release-assets/ \;
          test "$(find release-assets -maxdepth 1 -type f -name '*.pdf' | wc -l)" -gt 0

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/*.pdf --clobber
          else
            gh release create "$GITHUB_REF_NAME" release-assets/*.pdf \
              --title "$GITHUB_REF_NAME" \
              --notes "AI Era ebook release $GITHUB_REF_NAME"
          fi
