name: Release PDFs

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing or new release tag to build PDFs for, for example v0.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build PDFs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python scripts/build_pdf.py --version "$RELEASE_TAG"
          else
            python scripts/build_pdf.py
          fi

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find dist -maxdepth 1 -type f -name '*.pdf' -exec cp {} release-assets/ \;
          test "$(find release-assets -maxdepth 1 -type f -name '*.pdf' | wc -l)" -gt 0

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/*.pdf --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/*.pdf \
              --title "$RELEASE_TAG" \
              --notes "AI Era ebook release $RELEASE_TAG"
          fi
